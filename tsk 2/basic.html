<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spice Hub Restaurant</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar">
  <h2>🍽️ Spice Hub</h2>
  <nav>
    <a href="#home">Home</a>
    <a href="#menu">Menu</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section id="home" class="hero">
  <h1>Delicious Food Delivered Fast</h1>
  <p>Order your favorite meals anytime</p>
  <a href="#menu" class="btn">Order Now</a>
</section>

<section id="menu">
  <h2 class="title">Our Menu</h2>

  <div class="grid">

    <div class="card">
      <img src="imge/briyni.jpg" alt="Briyani">
      <h3>Briyani</h3>
      <p class="price">₹150</p>
      <button class="order">Order</button>
    </div>

    <div class="card">
      <img src="imge/noodles.png" alt="Noodles">
      <h3>Noodles</h3>
      <p class="price">₹60</p>
      <button class="order">Order</button>
    </div>

    <div class="card">
      <img src="imge/burger.jpg" alt="Burger">
      <h3>Burger</h3>
      <p class="price">₹99</p>
      <button class="order">Order</button>
    </div>

    <div class="card">
      <img src="imge/burger.jpg" alt="Special Burger">
      <h3>Special Burger</h3>
      <p class="price">₹149</p>
      <button class="order">Order</button>
    </div>

    <div class="card">
      <img src="imge/parotta.avif" alt="Parotta">
      <h3>Parotta</h3>
      <p class="price">₹20</p>
      <button class="order">Order</button>
    </div>

    <div class="card">
      <img src="imge/full.avif" alt="Meals">
      <h3>Full Meals</h3>
      <p class="price">₹80</p>
      <button class="order">Order</button>
    </div>

  </div>
</section>

<footer id="contact" class="contact">
  <h2>Contact Us</h2>
  <p>📞 Phone: 9876543210</p>
  <p>📧 Email: ms136@gmail.com</p>
</footer>

</body>
</html>
